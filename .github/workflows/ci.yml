name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install tmux, zsh and nushell
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux zsh
          curl -L https://github.com/nushell/nushell/releases/download/0.113.1/nu-0.113.1-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv nu-0.113.1-x86_64-unknown-linux-gnu/nu /usr/local/bin/nu
      - name: Install Oh My Zsh
        run: |
          sudo mkdir -p /usr/share/oh-my-zsh
          sudo git clone --depth=1 https://github.com/ohmyzsh/ohmyzsh.git /usr/share/oh-my-zsh
      - run: cargo test --workspace --all-features

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install tmux, zsh and nushell
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux zsh
          curl -L https://github.com/nushell/nushell/releases/download/0.113.1/nu-0.113.1-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv nu-0.113.1-x86_64-unknown-linux-gnu/nu /usr/local/bin/nu
      - name: Install Oh My Zsh
        run: |
          sudo mkdir -p /usr/share/oh-my-zsh
          sudo git clone --depth=1 https://github.com/ohmyzsh/ohmyzsh.git /usr/share/oh-my-zsh
      - name: Install Playwright
        run: |
          cd e2e
          npm ci
          npx playwright install --with-deps chromium
      - name: Build server
        run: cargo build -p term2-api --bin term2-server
      - name: Run E2E tests
        run: cd e2e && ./run.sh

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-audit --locked
      - run: cargo audit

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check all

  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/rust
            p/security-audit
            p/owasp-top-ten

  deploy:
    needs: [fmt, clippy, test, e2e, audit, deny, sast]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy placeholder
        run: |
          echo "Deployment step for term2.lucanian.app"
          echo "Current strategy: systemd + Caddy on the VPS"
